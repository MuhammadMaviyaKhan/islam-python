services:
  - type: web
    name: islam-python
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: FLASK_CONFIG
        value: production
      - key: SECRET_KEY
        generateValue: true
