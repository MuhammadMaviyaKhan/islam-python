{% extends "base.html" %}{% block title %}Islamic Calendar - Shia Islam{% endblock %}
{% block content %}
<div class="container py-5">
    <h2 class="fw-bold mb-4"><i class="bi bi-calendar-event text-gold me-2"></i>Islamic Calendar & Events</h2>
    <div class="card card-islamic">
        <div class="card-body">
            <table class="table table-striped">
                <thead><tr><th>Event</th><th>Hijri Date</th><th>Type</th></tr></thead>
                <tbody>{% for ev in events %}<tr>
                    <td class="fw-bold">{{ ev.title }}</td>
                    <td>{{ ev.hijri_date }}</td>
                    <td><span class="badge {% if ev.event_type == 'mourning' %}bg-dark{% elif ev.event_type == 'eid' %}bg-gold{% else %}bg-info{% endif %}">{{ ev.event_type }}</span></td>
                </tr>{% endfor %}</tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
