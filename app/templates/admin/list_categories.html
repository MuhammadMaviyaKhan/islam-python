{% extends "base.html" %}{% block title %}Categories{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Categories</h4>
        <a href="{{ url_for('admin.create_category') }}" class="btn btn-gold btn-sm">Add New</a>
    </div>
    <table class="table table-striped">
        <thead><tr><th>Name</th><th>Type</th><th>Actions</th></tr></thead>
        <tbody>{% for c in categories %}<tr>
            <td>{{ c.name }}</td><td>{{ c.content_type }}</td>
            <td><a href="{{ url_for('admin.delete_category', id=c.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete?')">Delete</a></td>
        </tr>{% endfor %}</tbody>
    </table>
</div>
{% endblock %}
