{% extends "base.html" %}{% block title %}Manage Namaz Guides{% endblock %}
{% block content %}
<div class="container py-5">
    <h4>Namaz Guides</h4>
    <table class="table table-striped">
        <thead><tr><th>Name</th><th>Type</th><th>Actions</th></tr></thead>
        <tbody>{% for item in items %}<tr>
            <td>{{ item.name }}</td><td>{{ item.prayer_type }}</td>
            <td><a href="{{ url_for('admin.edit_namaz', id=item.id) }}" class="btn btn-sm btn-gold">Edit</a></td>
        </tr>{% endfor %}</tbody>
    </table>
</div>
{% endblock %}
