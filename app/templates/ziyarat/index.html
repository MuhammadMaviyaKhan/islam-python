{% extends "base.html" %}
{% block title %}Ziyarat - Shia Islam{% endblock %}
{% block content %}
<div class="container py-5">
    <h2 class="fw-bold mb-4"><i class="bi bi-geo-alt text-gold me-2"></i>Ziyarat</h2>
    <div class="row g-4">
        {% for z in ziyarats %}
        <div class="col-md-4">
            <div class="card card-islamic h-100">
                <div class="card-body text-center">
                    <h5 class="card-title">{{ z.title }}</h5>
                    <p class="arabic-text small mb-3" dir="rtl">{{ z.arabic[:80] }}...</p>
                    <a href="{{ url_for('ziyarat.detail', slug=z.slug) }}" class="btn btn-gold btn-sm">Read</a>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12"><div class="alert alert-info">No ziyarat available.</div></div>
        {% endfor %}
    </div>
</div>
{% endblock %}
