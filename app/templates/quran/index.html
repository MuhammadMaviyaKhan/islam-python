{% extends "base.html" %}{% block title %}Quran - Shia Islam{% endblock %}
{% block content %}
<div class="container py-5">
    <h2 class="fw-bold mb-4"><i class="bi bi-book text-gold me-2"></i>The Holy Quran</h2>
    <div class="row g-3">
        {% for s in surahs %}
        <div class="col-md-3 col-6">
            <a href="{{ url_for('quran.surah', surah=s.number) }}" class="text-decoration-none">
                <div class="card card-islamic text-center p-3 h-100">
                    <h5 class="mb-1">{{ s.number }}</h5>
                    <small class="text-muted">{{ s.verses }} verses</small>
                </div>
            </a>
        </div>
        {% else %}
        <div class="col-12"><div class="alert alert-info">Quran verses are being added. Check back soon.</div></div>
        {% endfor %}
    </div>
</div>
{% endblock %}
